<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117" />
  <link rel="icon" href="icons/icon-192x192-A.png" type="image/png" />
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>UMKMGODIGITAL – Strategi Bisnis UMKM</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1f2937;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5a0;
      --accent2: #ff6b35;
      --accent3: #6366f1;
      --text: #e6edf3;
      --muted: #8b949e;
      --danger: #f87171;
      --warning: #fbbf24;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      overflow-x: hidden;
    }
    .header {
      background: rgba(13,17,23,0.97);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky; top: 0; z-index: 200;
    }
    .header-inner {
      max-width: 900px; margin: 0 auto; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-mark {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #000;
    }
    .logo-text {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px;
      letter-spacing: -0.5px;
    }
    .logo-text span { color: var(--accent); }
    .btn-settings {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-settings:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .stats-bar {
      background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px;
    }
    .stats-bar-inner {
      max-width: 900px; margin: 0 auto; display: flex; gap: 32px;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-val {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 22px; color: var(--accent);
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .container { max-width: 900px; margin: 0 auto; padding: 28px 20px; }
    .api-banner {
      background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px; font-size: 13px;
    }
    .api-banner.hidden { display: none; }
    .api-banner-text { flex: 1; color: var(--warning); }
    .api-banner-btn {
      background: var(--warning); color: #000; border: none; border-radius: 8px;
      padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
    }
    .add-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; margin-bottom: 32px;
    }
    .add-card-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 18px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 11px 14px; transition: border-color 0.2s; width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface); }
    .btn-add {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 10px; padding: 13px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .section-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .filter-row {
      display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px;
    }
    .filter-tab {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 8px 18px; font-size: 13px; color: var(--muted); cursor: pointer;
      white-space: nowrap; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .filter-tab:hover { color: var(--text); }
    .filter-tab.active {
      background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600;
    }
    .products-grid { display: flex; flex-direction: column; gap: 14px; }
    .product-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; transition: border-color 0.2s;
      animation: fadeUp 0.3s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .product-card:hover { border-color: rgba(0,229,160,0.2); }
    .product-card-header {
      padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px; cursor: pointer;
    }
    .product-emoji {
      font-size: 30px; width: 52px; height: 52px; background: var(--bg);
      border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; margin-bottom: 6px; }
    .product-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .badge-cat { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .badge-price { background: rgba(0,229,160,0.1); color: var(--accent); }
    .badge-loc { background: rgba(251,191,36,0.1); color: var(--warning); }
    .badge-ok { background: rgba(0,229,160,0.1); color: var(--accent); }
    .product-card-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: flex-start; }
    .btn-sm {
      padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-weight: 500;
      transition: all 0.2s; display: flex; align-items: center; gap: 4px;
    }
    .btn-strategy { background: rgba(0,229,160,0.1); color: var(--accent); border-color: rgba(0,229,160,0.2); }
    .btn-strategy:hover { background: rgba(0,229,160,0.2); }
    .btn-delete { background: rgba(248,113,113,0.08); color: var(--danger); border-color: rgba(248,113,113,0.15); }
    .btn-delete:hover { background: rgba(248,113,113,0.15); }
    .strategy-panel { border-top: 1px solid var(--border); padding: 20px; display: none; }
    .strategy-panel.open { display: block; }
    .strategy-loading {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 14px; padding: 16px 0;
    }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .strategy-content h3 {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: var(--accent); margin: 18px 0 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .strategy-content h3:first-child { margin-top: 0; }
    .strategy-content p { font-size: 14px; line-height: 1.7; color: var(--text); margin-bottom: 6px; }
    .strategy-content ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .strategy-content ul li {
      font-size: 14px; line-height: 1.6; padding-left: 18px; position: relative; color: var(--text);
    }
    .strategy-content ul li::before {
      content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 11px; top: 3px;
    }
    .platform-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .platform-tag {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500;
    }
    .strategy-actions {
      display: flex; gap: 10px; margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border); flex-wrap: wrap; align-items: center;
    }
    .btn-export {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 9px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-export:hover { border-color: rgba(255,255,255,0.2); }
    .btn-regen {
      background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); color: var(--accent);
      padding: 9px 16px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .btn-regen:hover { background: rgba(0,229,160,0.15); }
    .strategy-timestamp { font-size: 11px; color: var(--muted); margin-left: auto; align-self: center; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
    .empty-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 500;
      display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 28px; width: 90%; max-width: 480px; position: relative;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .modal-close {
      position: absolute; top: 20px; right: 20px; background: var(--bg);
      border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
      width: 32px; height: 32px; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-form-group { margin-bottom: 14px; }
    .api-note {
      font-size: 12px; color: var(--muted); background: rgba(99,102,241,0.08);
      border: 1px solid rgba(99,102,241,0.15); border-radius: 8px; padding: 10px 12px;
      margin-top: 6px; line-height: 1.5;
    }
    .btn-save-api {
      width: 100%; background: var(--accent); color: #000; border: none;
      border-radius: 10px; padding: 12px; margin-top: 8px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer;
    }
    .btn-save-api:hover { opacity: 0.88; }
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 999;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,17,23,0.97); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 10px 0 max(10px, env(safe-area-inset-bottom)); z-index: 300;
    }
    .nav-inner { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-around; }
    .nav-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      background: none; border: none; color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 10px; cursor: pointer; padding: 6px 20px; transition: color 0.2s; border-radius: 12px;
    }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn.active { color: var(--accent); }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .stats-bar-inner { gap: 20px; }
      .stat-val { font-size: 18px; }
      .product-card-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">U</div>
      <div class="logo-text">UMKM<span>GO</span>DIGITAL</div>
    </div>
    <button class="btn-settings" onclick="openSettings()">⚙️ Pengaturan</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stats-bar-inner">
    <div class="stat">
      <div class="stat-val" id="statTotal">0</div>
      <div class="stat-label">Total Produk</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statAnalyzed">0</div>
      <div class="stat-label">Dianalisis</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statCategories">0</div>
      <div class="stat-label">Kategori</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="api-banner" id="apiBanner">
    <span style="font-size:20px">⚠️</span>
    <div class="api-banner-text">Masukkan API Key Claude untuk mengaktifkan fitur Strategi AI.</div>
    <button class="api-banner-btn" onclick="openSettings()">Atur Sekarang</button>
  </div>

  <div class="add-card">
    <div class="add-card-title">➕ Tambah Produk UMKM</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Nama Produk *</label>
        <input type="text" id="fName" placeholder="Contoh: Keripik Tempe Pedas" />
      </div>
      <div class="form-group">
        <label>Kategori *</label>
        <select id="fCategory">
          <option value="">Pilih Kategori</option>
          <option>Makanan &amp; Minuman</option>
          <option>Fashion &amp; Pakaian</option>
          <option>Kerajinan Tangan</option>
          <option>Kecantikan &amp; Perawatan</option>
          <option>Pertanian &amp; Perkebunan</option>
          <option>Elektronik &amp; Aksesori</option>
          <option>Rumah &amp; Dekorasi</option>
          <option>Jasa &amp; Layanan</option>
          <option>Lainnya</option>
        </select>
      </div>
      <div class="form-group">
        <label>Harga Jual (Rp) *</label>
        <input type="number" id="fPrice" placeholder="25000" min="0" />
      </div>
      <div class="form-group">
        <label>Modal / HPP (Rp)</label>
        <input type="number" id="fCost" placeholder="10000" min="0" />
      </div>
      <div class="form-group">
        <label>Lokasi UMKM</label>
        <input type="text" id="fLocation" placeholder="Contoh: Solo, Jawa Tengah" />
      </div>
      <div class="form-group">
        <label>Target Pembeli</label>
        <select id="fTarget">
          <option value="">Semua kalangan</option>
          <option>Anak-anak</option>
          <option>Remaja</option>
          <option>Dewasa muda</option>
          <option>Ibu rumah tangga</option>
          <option>Profesional</option>
          <option>Lansia</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Deskripsi Produk</label>
        <textarea id="fDesc" placeholder="Ceritakan keunggulan produk, bahan baku, proses produksi, atau hal yang membedakannya dari kompetitor..."></textarea>
      </div>
    </div>
    <button class="btn-add" onclick="addProduct()" id="btnAdd">
      🚀 Tambah &amp; Analisis Strategi
    </button>
  </div>

  <div class="section-header">
    <div class="section-title">Daftar Produk</div>
  </div>
  <div class="filter-row">
    <button class="filter-tab active" onclick="setFilter('all', this)">Semua</button>
    <button class="filter-tab" onclick="setFilter('analyzed', this)">✅ Sudah Dianalisis</button>
    <button class="filter-tab" onclick="setFilter('pending', this)">⏳ Belum Dianalisis</button>
  </div>

  <div class="products-grid" id="productsList"></div>
</div>

<nav class="bottom-nav">
  <div class="nav-inner">
    <button class="nav-btn active" id="navHome" onclick="navClick('home', this)">
      <span class="nav-icon">🏠</span><span>Produk</span>
    </button>
    <button class="nav-btn" id="navDash" onclick="navClick('dashboard', this)">
      <span class="nav-icon">📊</span><span>Dashboard</span>
    </button>
    <button class="nav-btn" id="navExport" onclick="navClick('export', this)">
      <span class="nav-icon">📤</span><span>Export Semua</span>
    </button>
  </div>
</nav>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <button class="modal-close" onclick="closeSettings()">✕</button>
    <div class="modal-title">⚙️ Pengaturan</div>
    <div class="modal-sub">Konfigurasi API untuk fitur Strategi AI</div>
    <div class="modal-form-group">
      <label>Anthropic API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      <div class="api-note">🔐 API Key disimpan hanya di perangkat Anda. Dapatkan di <strong>console.anthropic.com</strong></div>
    </div>
    <div class="modal-form-group">
      <label>Nama Profil UMKM (opsional)</label>
      <input type="text" id="profileName" placeholder="Contoh: Toko Bu Sari" />
    </div>
    <button class="btn-save-api" onclick="saveSettings()">💾 Simpan Pengaturan</button>
  </div>
</div>

<!-- Dashboard Modal -->
<div class="modal-overlay" id="dashModal">
  <div class="modal" style="max-width:540px">
    <button class="modal-close" onclick="document.getElementById('dashModal').classList.remove('open')">✕</button>
    <div class="modal-title">📊 Dashboard</div>
    <div class="modal-sub" id="dashProfile"></div>
    <div id="dashContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = [];
let currentFilter = 'all';
let apiKey = '';
let profileName = '';

function init() {
  const saved = localStorage.getItem('umkm_products');
  if (saved) { try { products = JSON.parse(saved); } catch(e) { products = []; } }
  apiKey = localStorage.getItem('umkm_apikey') || '';
  profileName = localStorage.getItem('umkm_profile') || '';
  if (apiKey) document.getElementById('apiKeyInput').value = apiKey;
  if (profileName) document.getElementById('profileName').value = profileName;
  updateBanner();
  render();
}

function save() { localStorage.setItem('umkm_products', JSON.stringify(products)); }

function updateBanner() {
  document.getElementById('apiBanner').classList.toggle('hidden', !!apiKey);
}

function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }

function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  profileName = document.getElementById('profileName').value.trim();
  localStorage.setItem('umkm_apikey', apiKey);
  localStorage.setItem('umkm_profile', profileName);
  updateBanner();
  closeSettings();
  showToast('✅ Pengaturan tersimpan');
}

function getCategoryEmoji(cat) {
  const map = {
    'Makanan & Minuman':'🍱','Fashion & Pakaian':'👗','Kerajinan Tangan':'🎨',
    'Kecantikan & Perawatan':'💄','Pertanian & Perkebunan':'🌿',
    'Elektronik & Aksesori':'📱','Rumah & Dekorasi':'🏡','Jasa & Layanan':'🤝','Lainnya':'📦'
  };
  return map[cat] || '📦';
}

function addProduct() {
  const name = document.getElementById('fName').value.trim();
  const category = document.getElementById('fCategory').value;
  const price = parseInt(document.getElementById('fPrice').value) || 0;
  const cost = parseInt(document.getElementById('fCost').value) || 0;
  const location = document.getElementById('fLocation').value.trim();
  const target = document.getElementById('fTarget').value;
  const desc = document.getElementById('fDesc').value.trim();

  if (!name) { showToast('⚠️ Nama produk wajib diisi!'); return; }
  if (!category) { showToast('⚠️ Kategori wajib dipilih!'); return; }
  if (!price) { showToast('⚠️ Harga jual wajib diisi!'); return; }

  const product = {
    id: Date.now(), name, category, price, cost, location, target, desc,
    emoji: getCategoryEmoji(category),
    createdAt: new Date().toLocaleString('id-ID'),
    strategy: null, strategyAt: null, _loading: false
  };

  products.unshift(product);
  save();
  ['fName','fPrice','fCost','fLocation','fDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fCategory').value = '';
  document.getElementById('fTarget').value = '';
  render();
  showToast('✅ Produk ditambahkan!');
  if (apiKey) setTimeout(() => generateStrategy(product.id), 500);
}

async function generateStrategy(id) {
  if (!apiKey) { openSettings(); return; }
  const p = products.find(x => x.id === id);
  if (!p) return;

  p._loading = true;
  render();
  const panel = document.getElementById('panel-' + id);
  if (panel) {
    panel.classList.add('open');
    panel.innerHTML = `<div class="strategy-loading"><div class="spinner"></div><span>Claude sedang menganalisis strategi untuk <strong>${p.name}</strong>...</span></div>`;
  }

  const margin = p.cost && p.price ? Math.round(((p.price - p.cost) / p.price) * 100) : null;

  const prompt = `Kamu adalah konsultan bisnis UMKM senior di Indonesia yang ahli di e-commerce, pemasaran digital, dan pengembangan usaha kecil menengah.

DATA PRODUK UMKM:
- Nama: ${p.name}
- Kategori: ${p.category}
- Harga Jual: Rp${p.price.toLocaleString('id-ID')}
${p.cost ? `- Modal/HPP: Rp${p.cost.toLocaleString('id-ID')} (estimasi margin ${margin}%)` : ''}
${p.location ? `- Lokasi: ${p.location}` : ''}
${p.target ? `- Target: ${p.target}` : ''}
${p.desc ? `- Deskripsi: ${p.desc}` : ''}

Buat strategi bisnis LENGKAP dan SPESIFIK dalam bahasa Indonesia. Gunakan format HTML berikut PERSIS:

<h3>🛒 Platform Penjualan Terbaik</h3>
<p>[Penjelasan singkat kenapa platform ini cocok untuk produk ini]</p>
<div class="platform-tags"><span class="platform-tag">Tokopedia</span><span class="platform-tag">Shopee</span></div>

<h3>📣 Strategi Pemasaran Digital</h3>
<ul>
<li>[Strategi 1 yang spesifik dan actionable]</li>
<li>[Strategi 2]</li>
<li>[Strategi 3]</li>
<li>[Strategi 4]</li>
</ul>

<h3>💰 Analisis Harga & Positioning</h3>
<p>[Analisis kompetitif harga, rekomendasi pricing, dan segmen pasar]</p>

<h3>📅 Business Plan 3 Bulan</h3>
<ul>
<li>Bulan 1: [Target dan langkah konkret]</li>
<li>Bulan 2: [Target dan langkah konkret]</li>
<li>Bulan 3: [Target dan langkah konkret]</li>
</ul>

<h3>⚡ Quick Wins (Langkah Pertama)</h3>
<ul>
<li>[Hal yang bisa dilakukan minggu ini]</li>
<li>[Hal lain yang bisa dilakukan]</li>
<li>[Dan satu lagi]</li>
</ul>

<h3>⚠️ Risiko & Solusi</h3>
<ul>
<li>[Risiko 1: solusinya]</li>
<li>[Risiko 2: solusinya]</li>
</ul>

Jadikan saran KONKRET, SPESIFIK untuk Indonesia, dan mudah dipahami pelaku UMKM.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    const text = data.content.map(c => c.text || '').join('');
    p.strategy = text;
    p.strategyAt = new Date().toLocaleString('id-ID');
    p._loading = false;
    save();
    render();
    const p2 = document.getElementById('panel-' + id);
    if (p2) p2.classList.add('open');
    showToast('✅ Strategi berhasil dibuat!');
  } catch(err) {
    p._loading = false;
    const p2 = document.getElementById('panel-' + id);
    if (p2) {
      p2.classList.add('open');
      p2.innerHTML = `<div style="color:var(--danger);font-size:14px;padding:16px 0;">❌ Gagal: ${err.message}<br><br><small>Cek API Key dan koneksi internet Anda.</small></div>`;
    }
    render();
    showToast('❌ Gagal generate strategi');
  }
}

function togglePanel(id) {
  const panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.toggle('open');
}

function deleteProduct(id) {
  if (!confirm('Hapus produk ini beserta strateginya?')) return;
  products = products.filter(p => p.id !== id);
  save();
  render();
  showToast('🗑️ Produk dihapus');
}

function exportStrategy(id) {
  const p = products.find(x => x.id === id);
  if (!p || !p.strategy) return;
  const div = document.createElement('div');
  div.innerHTML = p.strategy;
  const txt = `UMKMGODIGITAL – Strategi Bisnis\n${'='.repeat(50)}\nProduk: ${p.name}\nKategori: ${p.category}\nHarga: Rp${p.price.toLocaleString('id-ID')}\nDibuat: ${p.strategyAt}\n${'='.repeat(50)}\n\n${div.textContent.trim()}`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
  a.download = `strategi-${p.name.replace(/[^a-z0-9]/gi,'-').toLowerCase()}.txt`;
  a.click();
  showToast('📥 Strategi diekspor!');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  let filtered = products;
  if (currentFilter === 'analyzed') filtered = products.filter(p => p.strategy);
  if (currentFilter === 'pending') filtered = products.filter(p => !p.strategy && !p._loading);

  const cats = new Set(products.map(p => p.category));
  document.getElementById('statTotal').textContent = products.length;
  document.getElementById('statAnalyzed').textContent = products.filter(p => p.strategy).length;
  document.getElementById('statCategories').textContent = cats.size;

  const list = document.getElementById('productsList');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${products.length === 0 ? '📦' : '🔍'}</div>
      <div class="empty-title">${products.length === 0 ? 'Belum ada produk' : 'Tidak ada produk'}</div>
      <div class="empty-sub">${products.length === 0 ? 'Tambahkan produk pertama Anda di atas!' : 'Coba pilih filter lain'}</div>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="product-card" id="card-${p.id}">
      <div class="product-card-header" onclick="togglePanel(${p.id})">
        <div class="product-emoji">${p.emoji}</div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">
            <span class="badge badge-cat">${p.category}</span>
            <span class="badge badge-price">Rp${p.price.toLocaleString('id-ID')}</span>
            ${p.location ? `<span class="badge badge-loc">📍 ${p.location}</span>` : ''}
            ${p.strategy ? '<span class="badge badge-ok">✅ Dianalisis</span>' : ''}
          </div>
        </div>
        <div class="product-card-actions">
          <button class="btn-sm btn-strategy" onclick="event.stopPropagation(); generateStrategy(${p.id})">
            ${p._loading ? '⏳' : '🤖'} ${p.strategy ? 'Ulang' : 'Analisis'}
          </button>
          <button class="btn-sm btn-delete" onclick="event.stopPropagation(); deleteProduct(${p.id})">🗑️</button>
        </div>
      </div>
      <div class="strategy-panel ${p.strategy || p._loading ? 'open' : ''}" id="panel-${p.id}">
        ${p._loading
          ? `<div class="strategy-loading"><div class="spinner"></div><span>Claude sedang menganalisis <strong>${p.name}</strong>...</span></div>`
          : p.strategy
            ? `<div class="strategy-content">${p.strategy}</div>
               <div class="strategy-actions">
                 <button class="btn-export" onclick="exportStrategy(${p.id})">📥 Export .txt</button>
                 <button class="btn-regen" onclick="generateStrategy(${p.id})">🔄 Regenerasi</button>
                 <span class="strategy-timestamp">${p.strategyAt}</span>
               </div>`
            : ''
        }
      </div>
    </div>`).join('');
}

function navClick(sec, el) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (sec === 'dashboard') showDashboard();
  else if (sec === 'export') exportAll();
  else { document.getElementById('navHome').classList.add('active'); el.classList.remove('active'); }
}

function showDashboard() {
  const cats = {};
  let totalValue = 0, totalMargin = 0, marginCount = 0;
  products.forEach(p => {
    cats[p.category] = (cats[p.category] || 0) + 1;
    totalValue += p.price;
    if (p.cost && p.price) { totalMargin += ((p.price - p.cost) / p.price) * 100; marginCount++; }
  });
  const avgMargin = marginCount ? Math.round(totalMargin / marginCount) : null;

  document.getElementById('dashProfile').textContent = profileName ? `Profil: ${profileName}` : 'Ringkasan Produk UMKM';
  document.getElementById('dashContent').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
        <div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--accent)">${products.length}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Total Produk</div>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
        <div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--accent)">${products.filter(p=>p.strategy).length}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Sudah Dianalisis</div>
      </div>
      ${avgMargin !== null ? `
      <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
        <div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--warning)">${avgMargin}%</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Rata-rata Margin</div>
      </div>` : ''}
      <div style="background:var(--bg);border-radius:12px;padding:16px;text-align:center">
        <div style="font-family:Syne,sans-serif;font-size:28px;font-weight:800;color:var(--accent3)">${Object.keys(cats).length}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">Kategori</div>
      </div>
    </div>
    <div style="font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Distribusi Kategori</div>
    ${Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([k,v]) => `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:13px;flex:1">${getCategoryEmoji(k)} ${k}</div>
        <div style="background:var(--bg);border-radius:20px;height:6px;flex:2;overflow:hidden">
          <div style="background:var(--accent);height:100%;width:${Math.round(v/products.length*100)}%;border-radius:20px"></div>
        </div>
        <div style="font-size:13px;color:var(--muted);width:40px;text-align:right">${v} item</div>
      </div>`).join('')}`;
  document.getElementById('dashModal').classList.add('open');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('navHome').classList.add('active');
}

function exportAll() {
  const analyzed = products.filter(p => p.strategy);
  if (analyzed.length === 0) { showToast('Belum ada strategi untuk diekspor'); return; }
  const div = document.createElement('div');
  const sep = '='.repeat(60);
  const text = analyzed.map(p => {
    div.innerHTML = p.strategy;
    return `PRODUK: ${p.name}\n${sep}\nKategori: ${p.category} | Harga: Rp${p.price.toLocaleString('id-ID')}\nDianalisis: ${p.strategyAt}\n\n${div.textContent.trim()}`;
  }).join('\n\n' + sep + '\n\n');
  const header = `UMKMGODIGITAL – Laporan Strategi Bisnis\n${profileName ? 'Profil: ' + profileName + '\n' : ''}Tanggal: ${new Date().toLocaleString('id-ID')}\n${sep}\n\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([header + text], { type: 'text/plain;charset=utf-8' }));
  a.download = 'semua-strategi-umkmgodigital.txt';
  a.click();
  showToast(`📥 ${analyzed.length} strategi diekspor!`);
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('navHome').classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });
document.getElementById('dashModal').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });
document.getElementById('fName').addEventListener('keypress', e => { if (e.key === 'Enter') addProduct(); });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.error('SW error:', err));
  });
}

init();
</script>
</body>
</html>
