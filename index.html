<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0d1117"/>
<title>AEON Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d1117;--sur:#161b22;--sur2:#1f2937;--bor:rgba(255,255,255,0.07);--acc:#00e5a0;--text:#e6edf3;--muted:#8b949e;--danger:#f87171;--warn:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.header{background:rgba(13,17,23,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--bor);padding:0 20px;position:sticky;top:0;z-index:200;}
.header-inner{max-width:860px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#000;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
.logo-text span{color:var(--acc);}
.container{max-width:860px;margin:0 auto;padding:24px 16px;}
.tab-row{display:flex;gap:8px;margin-bottom:24px;background:var(--sur);border-radius:12px;padding:4px;}
.tab{flex:1;padding:10px 8px;border-radius:9px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--acc);color:#000;}
/* progress */
.prog-wrap{margin-bottom:20px;}
.prog-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--muted);}
.prog-info span:last-child{color:var(--acc);font-weight:500;}
.prog-bg{background:var(--sur2);border-radius:99px;height:6px;}
.prog-fill{background:var(--acc);height:6px;border-radius:99px;transition:width 0.4s;}
/* phase */
.phase{margin-bottom:20px;}
.phase-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.phase-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;}
.phase-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
/* item */
.item{background:var(--sur);border:1px solid var(--bor);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color 0.2s;}
.item.done{border-color:rgba(0,229,160,0.15);}
.item-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer;}
.item-header:hover{background:rgba(255,255,255,0.02);}
.cb{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all 0.2s;cursor:pointer;}
.item.done .cb{background:var(--acc);border-color:var(--acc);}
.cb svg{display:none;}
.item.done .cb svg{display:block;}
.item-body{flex:1;min-width:0;}
.item-text{font-size:13px;line-height:1.5;color:var(--text);}
.item.done .item-text{color:var(--muted);text-decoration:line-through;}
.item-tip{font-size:11px;color:var(--muted);margin-top:3px;}
.expand-btn{font-size:11px;color:var(--acc);border:1px solid rgba(0,229,160,0.2);background:rgba(0,229,160,0.06);border-radius:8px;padding:3px 10px;cursor:pointer;flex-shrink:0;white-space:nowrap;margin-top:1px;}
/* materi panel */
.materi{display:none;border-top:1px solid var(--bor);padding:14px 16px;background:rgba(0,0,0,0.2);}
.materi.open{display:block;}
.m-section-title{font-size:10px;font-weight:500;color:var(--acc);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;margin-top:12px;}
.m-section-title:first-child{margin-top:0;}
.m-text{font-size:13px;line-height:1.7;color:var(--text);}
.m-tips{list-style:none;display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.m-tips li{font-size:13px;line-height:1.5;padding-left:14px;position:relative;color:var(--text);}
.m-tips li::before{content:'▸';position:absolute;left:0;color:var(--acc);font-size:10px;top:3px;}
.tpl-box{background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:12px;margin-top:10px;}
.tpl-box-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.tpl-type-badge{font-size:10px;padding:2px 7px;border-radius:20px;}
.tpl-text{font-size:12px;color:var(--text);line-height:1.7;white-space:pre-wrap;font-family:monospace;}
.copy-btn{margin-top:8px;font-size:11px;color:var(--muted);border:1px solid var(--bor);background:var(--bg);border-radius:6px;padding:4px 10px;cursor:pointer;transition:all 0.2s;}
.copy-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.15);}
.copy-btn.copied{color:var(--acc);border-color:rgba(0,229,160,0.3);}
/* summary */
.summary{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:16px;margin-top:16px;display:flex;gap:16px;align-items:center;}
.sum-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--acc);}
.sum-label{font-size:11px;color:var(--muted);}
.sum-level{font-size:13px;font-weight:500;margin-top:4px;}
.reset-btn{font-size:12px;color:var(--muted);border:1px solid var(--bor);background:none;border-radius:8px;padding:5px 12px;cursor:pointer;margin-top:8px;}
/* template tab */
.tpl-section{padding-bottom:8px;}
.tpl-cat{margin-bottom:24px;}
.tpl-cat-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.tpl-cat-icon{font-size:18px;}
.tpl-cat-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.tpl-card{background:var(--sur);border:1px solid var(--bor);border-radius:12px;padding:14px;margin-bottom:8px;}
.tpl-card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.tpl-card-text{font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--text);}
.tpl-card .copy-btn{display:block;}
/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,17,23,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--bor);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:300;}
.bnav-inner{max-width:400px;margin:0 auto;display:flex;justify-content:space-around;}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;cursor:pointer;padding:5px 20px;border-radius:10px;transition:color 0.2s;}
.nb.active{color:var(--acc);}
.nb-icon{font-size:19px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--sur2);border:1px solid var(--bor);color:var(--text);padding:8px 18px;border-radius:30px;font-size:13px;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.3s;white-space:nowrap;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">A</div>
      <div class="logo-text">AEON <span>Academy</span></div>
    </div>
    <span style="font-size:11px;color:var(--muted);">Academy</span>
  </div>
</header>

<div class="container">
  <div class="tab-row">
    <button class="tab active" onclick="switchTab('checklist',this)">📋 Checklist + Materi</button>
    <button class="tab" onclick="switchTab('template',this)">📝 Template Konten</button>
  </div>

  <!-- CHECKLIST TAB -->
  <div id="tab-checklist">
    <div class="prog-wrap">
      <div class="prog-info">
        <span id="prog-label">0 dari 20 selesai</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="prog-bg"><div class="prog-fill" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div id="cl-root"></div>
    <div class="summary">
      <div>
        <div class="sum-num" id="sum-num">0</div>
        <div class="sum-label">langkah selesai</div>
      </div>
      <div style="flex:1">
        <div class="sum-level" id="sum-level">Belum mulai — yuk mulai dari fase 1!</div>
        <button class="reset-btn" onclick="resetAll()">Reset semua</button>
      </div>
    </div>
  </div>

  <!-- TEMPLATE TAB -->
  <div id="tab-template" style="display:none" class="tpl-section">
    <div id="tpl-root"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

const state = {};
try { Object.assign(state, JSON.parse(localStorage.getItem('umkm_acad') || '{}')); } catch(e) {}

function saveState() { try { localStorage.setItem('umkm_acad', JSON.stringify(state)); } catch(e) {} }

function getLevel(done, total) {
  const p = done / total;
  if (p === 0) return "Belum mulai — yuk mulai dari fase 1!";
  if (p < 0.25) return "Baru mulai — terus semangat!";
  if (p < 0.5) return "Cukup baik — kamu sudah di jalur yang benar";
  if (p < 0.75) return "Bagus! Hampir go digital penuh";
  if (p < 1) return "Hampir sempurna! Selesaikan langkah terakhir";
  return "🎉 Selamat! UMKM kamu siap go digital 100%!";
}

function updateProgress() {
  let total = 0, done = 0;
  phases.forEach((ph, pi) => ph.items.forEach((_, ii) => { total++; if (state[pi+'-'+ii]) done++; }));
  const pct = Math.round(done / total * 100);
  document.getElementById('prog-label').textContent = done + ' dari ' + total + ' selesai';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('sum-num').textContent = done;
  document.getElementById('sum-level').textContent = getLevel(done, total);
}

function toggleCheck(pi, ii, e) {
  e.stopPropagation();
  const key = pi+'-'+ii;
  state[key] = !state[key];
  document.getElementById('item-'+pi+'-'+ii).classList.toggle('done', !!state[key]);
  saveState();
  updateProgress();
}

function toggleMateri(pi, ii) {
  const panel = document.getElementById('materi-'+pi+'-'+ii);
  const btn = document.getElementById('ebtn-'+pi+'-'+ii);
  const open = panel.classList.toggle('open');
  btn.textContent = open ? 'Tutup' : 'Lihat materi';
}

function copyText(id, btnId) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(btnId);
    const orig = btn.textContent;
    btn.textContent = '✅ Disalin!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1600);
  });
}

function resetAll() {
  if (!confirm('Reset semua progress?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  document.querySelectorAll('.item').forEach(el => el.classList.remove('done'));
  saveState();
  updateProgress();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-checklist').style.display = tab === 'checklist' ? 'block' : 'none';
  document.getElementById('tab-template').style.display = tab === 'template' ? 'block' : 'none';
}

function typeBadgeStyle(type) {
  if (type === 'IG') return 'background:rgba(233,64,87,0.15);color:#f87171;';
  if (type === 'WA') return 'background:rgba(37,211,102,0.15);color:#4ade80;';
  return 'background:rgba(96,165,250,0.15);color:#60a5fa;';
}

function renderChecklist() {
  const root = document.getElementById('cl-root');

        <span class="phase-badge" style="background:${ph.color};color:${ph.tc}">Fase ${pi+1}</span>
        <span class="phase-title">${ph.title}</span>
      </div>
      ${ph.items.map((item, ii) => `
        <div class="item ${state[pi+'-'+ii] ? 'done' : ''}" id="item-${pi}-${ii}">
          <div class="item-header" onclick="toggleMateri(${pi},${ii})">
            <div class="cb" onclick="toggleCheck(${pi},${ii},event)">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="item-body">
              <div class="item-text">${item.text}</div>
              <div class="item-tip">${item.tip}</div>
            </div>
            <button class="expand-btn" id="ebtn-${pi}-${ii}">Lihat materi</button>
          </div>
          <div class="materi" id="materi-${pi}-${ii}">
            <div class="m-section-title">Materi Belajar</div>
            <div class="m-text">${item.materi}</div>
            <div class="m-section-title">Tips Praktis</div>
            <ul class="m-tips">${item.tips.map(t => '<li>'+t+'</li>').join('')}</ul>
            <div class="m-section-title">Template Konten</div>
            <div class="tpl-box">
              <div class="tpl-box-label">
                <span class="tpl-type-badge" style="${typeBadgeStyle(item.tpl.type)}">${item.tpl.type}</span>
                ${item.tpl.label}
              </div>
              <div class="tpl-text" id="tpltext-${pi}-${ii}">${item.tpl.text}</div>
              <button class="copy-btn" id="copybtn-${pi}-${ii}" onclick="copyText('tpltext-${pi}-${ii}','copybtn-${pi}-${ii}')">📋 Salin template</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
  updateProgress();
}

function renderTemplates() {
  const root = document.getElementById('tpl-root');
  root.innerHTML = extraTemplates.map((cat, ci) => `
    <div class="tpl-cat">
      <div class="tpl-cat-header">
        <span class="tpl-cat-icon">${cat.icon}</span>
        <span class="tpl-cat-title">${cat.cat}</span>
      </div>
      ${cat.items.map((item, ii) => `
        <div class="tpl-card">
          <div class="tpl-card-label">${item.label}</div>
          <div class="tpl-card-text" id="xtpl-${ci}-${ii}">${item.text}</div>
          <button class="copy-btn" id="xcopy-${ci}-${ii}" onclick="copyText('xtpl-${ci}-${ii}','xcopy-${ci}-${ii}')">📋 Salin template</button>
        </div>
      `).join('')}
    </div>
  `).join('');
}
